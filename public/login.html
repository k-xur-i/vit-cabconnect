<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>VIT CabConnect – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --indigo:#4F46E5;--indigo-d:#3730A3;--violet:#7C3AED;
  --indigo-l:#EEF2FF;--s900:#0F172A;--s800:#1E293B;
  --s200:#E2E8F0;--s100:#F1F5F9;--s50:#F8FAFC;
  --text:#0F172A;--t2:#475569;--t3:#94A3B8;--border:#E2E8F0;
  --green:#10B981;--rose:#F43F5E;--font:'Plus Jakarta Sans',sans-serif;
}
html,body{height:100%;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4338ca 100%);display:flex;align-items:center;justify-content:center;font-family:var(--font);overflow:hidden}
.phone{width:335px;background:#F1F5F9;border-radius:44px;box-shadow:0 0 0 1px rgba(255,255,255,.15),0 40px 100px rgba(0,0,0,.5),0 8px 32px rgba(79,70,229,.3);overflow:hidden;display:flex;flex-direction:column;max-height:96vh}
.shell-top{background:var(--s900);padding:12px 20px 8px;flex-shrink:0}
.notch-row{display:flex;justify-content:space-between;align-items:center}
.notch-time{color:#fff;font-size:13px;font-weight:700}
.notch-icons{display:flex;align-items:center;gap:5px}
.notch-icons svg{fill:#fff;opacity:.9}
/* Hero */
.hero{background:linear-gradient(135deg,var(--indigo) 0%,var(--violet) 100%);padding:32px 24px 36px;position:relative;overflow:hidden;flex-shrink:0;text-align:center}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero::after{content:'';position:absolute;bottom:-30px;left:20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.05)}
.logo-wrap{width:72px;height:72px;border-radius:22px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;backdrop-filter:blur(10px)}
.logo-letters{font-size:24px;font-weight:800;color:#fff;letter-spacing:1px}
.app-name{font-size:22px;font-weight:800;color:#fff;margin-bottom:5px}
.tagline{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}
/* Form card */
.form-card{background:#fff;border-radius:28px 28px 0 0;flex:1;overflow-y:auto;scrollbar-width:none}
.form-card::-webkit-scrollbar{display:none}
.fc-inner{padding:28px 24px 24px}
.form-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px}
.form-sub{font-size:12.5px;color:var(--t3);margin-bottom:22px;font-weight:500}
.fl{font-size:11.5px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:var(--s50);border:1.5px solid var(--border);border-radius:12px;padding:13px 44px 13px 14px;font-size:14px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.1);background:#fff}
.fi.err{border-color:var(--rose);background:#fff5f5}
.fi.ok{border-color:var(--green)}
.field{margin-bottom:14px;position:relative}
.iw{position:relative}
.eyebtn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3);font-size:15px;padding:4px}
.emsg{font-size:11px;color:var(--rose);font-weight:600;margin-top:4px;min-height:15px}
.pbtn{width:100%;background:linear-gradient(135deg,var(--indigo),var(--violet));color:#fff;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.35);transition:opacity .18s,transform .12s;margin-top:4px}
.pbtn:hover:not(:disabled){opacity:.9}
.pbtn:active:not(:disabled){transform:scale(.97)}
.pbtn:disabled{opacity:.6;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0 16px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:12px;color:var(--t3);font-weight:600}
.sec-btn{width:100%;background:var(--indigo-l);color:var(--indigo);border:none;border-radius:14px;padding:14px;font-size:14.5px;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .18s,transform .12s}
.sec-btn:hover{background:#e0e7ff}
.sec-btn:active{transform:scale(.97)}
.fnote{margin-top:14px;font-size:11px;color:var(--t3);text-align:center;font-weight:500}
.spinner{display:inline-block;width:15px;height:15px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s800);color:#fff;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:all .28s;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.s{background:var(--green)}.toast.e{background:var(--rose)}.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:380px){html,body{background:#F1F5F9;align-items:flex-start}.phone{width:100%;max-height:100vh;border-radius:0;box-shadow:none}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="phone">
  <div class="shell-top">
    <div class="notch-row">
      <span class="notch-time" id="live-time">--:--</span>
      <div class="notch-icons">
        <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4" y="4" width="3" height="7" rx="1"/><rect x="8" y="2" width="3" height="9" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
        <svg width="14" height="11" viewBox="0 0 14 11"><circle cx="7" cy="9.5" r="1" fill="white"/><path d="M4.5 6.5a3.5 3.5 0 015 0" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M2 4a6 6 0 0110 0" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
        <svg width="22" height="11" viewBox="0 0 22 11"><rect x="0" y="1" width="18" height="9" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="1" y="2" width="13" height="7" rx="1.5" fill="#fff"/><path d="M19 3.5v4a1.5 1.5 0 000-4z" fill="#fff"/></svg>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="logo-wrap"><span class="logo-letters">CC</span></div>
    <div class="app-name">VIT CabConnect</div>
    <div class="tagline">Ride smarter. Travel together.</div>
  </div>
  <div class="form-card"><div class="fc-inner">
    <div class="form-title">Welcome back 👋</div>
    <div class="form-sub">Sign in to your account</div>
    <div class="field">
      <div class="fl">VIT Email ID</div>
      <div class="iw"><input class="fi" id="email" type="email" placeholder="yourname@vitstudent.ac.in" oninput="ce('email')" onblur="ve()"/></div>
      <div class="emsg" id="email-e"></div>
    </div>
    <div class="field">
      <div class="fl">Password</div>
      <div class="iw">
        <input class="fi" id="pwd" type="password" placeholder="Enter your password" oninput="ce('pwd')" onblur="vp()"/>
        <button class="eyebtn" onclick="tp()" id="eyeb">👁</button>
      </div>
      <div class="emsg" id="pwd-e"></div>
    </div>
    <button class="pbtn" id="lbtn" onclick="doLogin()">Log in</button>
    <div class="divider"><span>don't have an account?</span></div>
    <button class="sec-btn" onclick="location.href='register.html'">Create Account</button>
    <p class="fnote">Only VIT email IDs are accepted</p>
  </div></div>
</div>
<script>
const API='https://vit-cabconnect-production.up.railway.app';
function toast(m,t=''){const el=document.getElementById('toast');el.textContent=m;el.className='toast '+(t==='s'?'s':t==='e'?'e':'')+' on';setTimeout(()=>el.classList.remove('on'),2800)}
function se(id,m){const i=document.getElementById(id),e=document.getElementById(id+'-e');if(i)i.classList.add('err');if(e)e.textContent=m}
function so(id){const i=document.getElementById(id),e=document.getElementById(id+'-e');if(i){i.classList.remove('err');i.classList.add('ok')}if(e)e.textContent=''}
function ce(id){const i=document.getElementById(id),e=document.getElementById(id+'-e');if(i)i.classList.remove('err');if(e)e.textContent=''}
function ve(){const v=document.getElementById('email').value.trim().toLowerCase();if(!v){se('email','Email is required');return false}if(!v.endsWith('@vitstudent.ac.in')&&!v.endsWith('@vit.ac.in')){se('email','Must be a VIT email');return false}so('email');return true}
function vp(){const v=document.getElementById('pwd').value;if(!v){se('pwd','Password is required');return false}if(v.length<6){se('pwd','Min 6 characters');return false}so('pwd');return true}
function tp(){const i=document.getElementById('pwd'),b=document.getElementById('eyeb');i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'👁':'🙈'}
async function doLogin(){
  if(!ve()||!vp())return;
  const btn=document.getElementById('lbtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Logging in…';
  try{
    const r=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value.trim(),password:document.getElementById('pwd').value})});
    const d=await r.json();
    if(r.ok){localStorage.setItem('vit_token',d.token);localStorage.setItem('vit_user',JSON.stringify(d.user));toast('Welcome back, '+d.user.name+'! 👋','s');setTimeout(()=>location.href='app.html',1400)}
    else{toast(d.message||'Login failed','e');if(d.field==='email')se('email',d.message);if(d.field==='password')se('pwd',d.message)}
  }catch{toast('Cannot reach server. Run: node server.js','e')}
  finally{btn.disabled=false;btn.innerHTML='Log in'}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function updateTime(){const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});const el=document.getElementById('live-time');if(el)el.textContent=t}
updateTime();setInterval(updateTime,1000);
</script>
</body>
</html>
