<script>
const API='https://vit-cabconnect-production.up.railway.app';
function toast(m,t=''){const el=document.getElementById('toast');el.textContent=m;el.className='toast '+(t==='s'?'s':t==='e'?'e':'')+' on';setTimeout(()=>el.classList.remove('on'),2800)}
function se(id,m){const i=document.getElementById(id),e=document.getElementById(id+'-e');if(i)i.classList.add('err');if(e)e.textContent=m}
function so(id){const i=document.getElementById(id),e=document.getElementById(id+'-e');if(i){i.classList.remove('err');i.classList.add('ok')}if(e)e.textContent=''}
function ce(id){const i=document.getElementById(id),e=document.getElementById(id+'-e');if(i)i.classList.remove('err');if(e)e.textContent=''}
function vname(){const v=document.getElementById('f-name').value.trim();if(!v){se('f-name','Name required');return false}if(v.length<2){se('f-name','Enter full name');return false}so('f-name');return true}
function vemail(){const v=document.getElementById('f-email').value.trim().toLowerCase();if(!v){se('f-email','Email required');return false}if(!v.endsWith('@vitstudent.ac.in')&&!v.endsWith('@vit.ac.in')){se('f-email','Must be @vitstudent.ac.in');return false}so('f-email');return true}
function vphone(){const v=document.getElementById('f-phone').value.trim();if(!v){se('f-phone','Phone required');return false}if(!/^\d{10}$/.test(v)){se('f-phone','Enter 10-digit number');return false}so('f-phone');return true}
function vpwd(){const v=document.getElementById('f-pwd').value;if(!v){se('f-pwd','Password required');return false}if(v.length<6){se('f-pwd','Min 6 characters');return false}so('f-pwd');return true}
function vcfm(){const p=document.getElementById('f-pwd').value,c=document.getElementById('f-cfm').value;if(!c){se('f-cfm','Please confirm');return false}if(p!==c){se('f-cfm','Passwords do not match');return false}so('f-cfm');return true}
function vdd(id,lbl){const v=document.getElementById(id).value;if(!v){se(id,lbl+' required');return false}so(id);return true}
function onpwd(){ce('f-pwd');const p=document.getElementById('f-pwd').value,f=document.getElementById('sfill'),l=document.getElementById('slbl');let s=0;if(p.length>=6)s++;if(p.length>=10)s++;if(/[A-Z]/.test(p))s++;if(/\d/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;const lvl=[['0%','',''],['25%','#e74c3c','Weak'],['50%','#e67e22','Fair'],['75%','#f1c40f','Good'],['100%','#27ae60','Strong'],['100%','#27ae60','Strong']][Math.min(s,5)];f.style.width=lvl[0];f.style.background=lvl[1];l.textContent=lvl[2];l.style.color=lvl[1]||'var(--text3)'}
function tp(iid,bid){const i=document.getElementById(iid),b=document.getElementById(bid);i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'👁':'🙈'}
async function doRegister(){
  const ok=[vname(),vemail(),vphone(),vpwd(),vcfm(),vdd('f-year','Year'),vdd('f-gender','Gender'),vdd('f-accom','Accommodation')].every(Boolean);
  if(!ok){toast('Please fix the errors above','e');return}
  const btn=document.getElementById('rbtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Creating…';
  try{
    const r=await fetch(API+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      name:document.getElementById('f-name').value.trim(),
      email:document.getElementById('f-email').value.trim(),
      phone:document.getElementById('f-phone').value.trim(),
      password:document.getElementById('f-pwd').value,
      year:document.getElementById('f-year').value,
      gender:document.getElementById('f-gender').value,
      accommodation:document.getElementById('f-accom').value
    })});
    const d=await r.json();
    if(r.ok){localStorage.setItem('vit_token',d.token);localStorage.setItem('vit_user',JSON.stringify(d.user));toast('Welcome to CabConnect! 🎉','s');setTimeout(()=>location.href='app.html',1400)}
    else{toast(d.message||'Registration failed','e');if(d.field)se('f-'+d.field,d.message)}
  }catch{toast('Cannot reach server. Run: node server.js','e')}
  finally{btn.disabled=false;btn.innerHTML='Create Account'}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});

function updateTime() {
  const now = new Date();
  const t = now.toLocaleTimeString('en-IN', {
    hour: '2-digit', minute: '2-digit',
    hour12: true, timeZone: 'Asia/Kolkata'
  });
  const el = document.getElementById('live-time');
  if (el) el.textContent = t;
}
updateTime();
setInterval(updateTime, 1000);

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<style>

.shell-top{background:var(--s900);padding:12px 20px 8px;flex-shrink:0}
.notch-row{display:flex;justify-content:space-between;align-items:center}
.notch-time{color:#fff;font-size:13px;font-weight:700}

.sfill{height:100%;border-radius:4px;width:0;transition:width .3s,background .3s}

@media(max-width:380px){html,body{background:#F1F5F9;align-items:flex-start}.phone{width:100%;max-height:100vh;border-radius:0;box-shadow:none}}

    </div>
    <div class="field">
      <div class="fl">Confirm Password</div>
      <div class="iw">
        <input class="fi fi-pwd" id="f-cfm" type="password" placeholder="Re-enter password" oninput="ce('f-cfm')" onblur="vcfm()"/>
        <button class="eyebtn" onclick="tp('f-cfm','eye2')" id="eye2">👁</button>
      </div>
      <div class="emsg" id="f-cfm-e"></div>
    </div>
    <button class="pbtn" id="rbtn" onclick="doRegister()">Create Account</button>
    <div class="divider"><span>already have an account?</span></div>
    <button class="sec-btn" onclick="location.href='login.html'">Log in</button>
    <p class="fnote">Only VIT email IDs are accepted</p>
  </div></div>
</div>
<script>
const API='https://vit-cabconnect-production.up.railway.app';
function toast(m,t=''){const el=document.getElementById('toast');el.textContent=m;el.className='toast '+(t==='s'?'s':t==='e'?'e':'')+' on';setTimeout(()=>el.classList.remove('on'),2800)}
function se(id,m){const i=document.getElementById(id),e=document.getElementById(id+'-e');if(i)i.classList.add('err');if(e)e.textContent=m}
function so(id){const i=document.getElementById(id),e=document.getElementById(id+'-e');if(i){i.classList.remove('err');i.classList.add('ok')}if(e)e.textContent=''}
function ce(id){const i=document.getElementById(id),e=document.getElementById(id+'-e');if(i)i.classList.remove('err');if(e)e.textContent=''}
function vname(){const v=document.getElementById('f-name').value.trim();if(!v){se('f-name','Name required');return false}if(v.length<2){se('f-name','Enter full name');return false}so('f-name');return true}
function vemail(){const v=document.getElementById('f-email').value.trim().toLowerCase();if(!v){se('f-email','Email required');return false}if(!v.endsWith('@vitstudent.ac.in')&&!v.endsWith('@vit.ac.in')){se('f-email','Must be @vitstudent.ac.in');return false}so('f-email');return true}
function vphone(){const v=document.getElementById('f-phone').value.trim();if(!v){se('f-phone','Phone required');return false}if(!/^\d{10}$/.test(v)){se('f-phone','Enter 10-digit number');return false}so('f-phone');return true}
function vpwd(){const v=document.getElementById('f-pwd').value;if(!v){se('f-pwd','Password required');return false}if(v.length<6){se('f-pwd','Min 6 characters');return false}so('f-pwd');return true}
function vcfm(){const p=document.getElementById('f-pwd').value,c=document.getElementById('f-cfm').value;if(!c){se('f-cfm','Please confirm');return false}if(p!==c){se('f-cfm','Passwords do not match');return false}so('f-cfm');return true}
function vdd(id,lbl){const v=document.getElementById(id).value;if(!v){se(id,lbl+' required');return false}so(id);return true}
function onpwd(){ce('f-pwd');const p=document.getElementById('f-pwd').value,f=document.getElementById('sfill'),l=document.getElementById('slbl');let s=0;if(p.length>=6)s++;if(p.length>=10)s++;if(/[A-Z]/.test(p))s++;if(/\d/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;const lvl=[['0%','',''],['25%','#F43F5E','Weak'],['50%','#F59E0B','Fair'],['75%','#3B82F6','Good'],['100%','#10B981','Strong'],['100%','#10B981','Strong']][Math.min(s,5)];f.style.width=lvl[0];f.style.background=lvl[1];l.textContent=lvl[2];l.style.color=lvl[1]||'var(--t3)'}
function tp(iid,bid){const i=document.getElementById(iid),b=document.getElementById(bid);i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'👁':'🙈'}
async function doRegister(){
  const ok=[vname(),vemail(),vphone(),vpwd(),vcfm(),vdd('f-year','Year'),vdd('f-gender','Gender'),vdd('f-accom','Accommodation')].every(Boolean);
  if(!ok){toast('Please fix the errors above','e');return}
  const btn=document.getElementById('rbtn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Creating…';
  try{
    const r=await fetch(API+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      name:document.getElementById('f-name').value.trim(),email:document.getElementById('f-email').value.trim(),
      phone:document.getElementById('f-phone').value.trim(),password:document.getElementById('f-pwd').value,
      year:document.getElementById('f-year').value,gender:document.getElementById('f-gender').value,accommodation:document.getElementById('f-accom').value
    })});
    const d=await r.json();
    if(r.ok){localStorage.setItem('vit_token',d.token);localStorage.setItem('vit_user',JSON.stringify(d.user));toast('Welcome to CabConnect! 🎉','s');setTimeout(()=>location.href='app.html',1400)}
    else{toast(d.message||'Registration failed','e');if(d.field)se('f-'+d.field,d.message)}
  }catch{toast('Cannot reach server. Run: node server.js','e')}
  finally{btn.disabled=false;btn.innerHTML='Create Account'}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});
function updateTime(){const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});const el=document.getElementById('live-time');if(el)el.textContent=t}
updateTime();setInterval(updateTime,1000);
</script>
</body>
</html>
